# ============================================================================
# Docker Compose — Infrastructure for Knowledge Workspace
# ============================================================================
#
# PURPOSE:
#   This file defines the services (containers) our application needs.
#   Right now, we only need PostgreSQL — our database server.
#
# WHY DOCKER?
#   Docker lets us run PostgreSQL without installing it directly on our machine.
#   Everyone on the team gets the exact same database version and config.
#   When you're done, just run `docker-compose down` to clean up.
#
# HOW TO USE:
#   Start:  docker-compose up -d       (runs in background)
#   Stop:   docker-compose down         (stops containers)
#   Reset:  docker-compose down -v      (stops + deletes data)
#   Logs:   docker-compose logs -f db   (watch database logs)
# ============================================================================

services:
  db:
    # We use the official PostgreSQL 16 image from Docker Hub
    image: postgres:16-alpine

    # Container name makes it easier to reference in logs
    container_name: knowledge_workspace_db

    # Environment variables configure PostgreSQL on first startup
    environment:
      POSTGRES_USER: kw_user              # Database username
      POSTGRES_PASSWORD: kw_password      # Database password (change in production!)
      POSTGRES_DB: knowledge_workspace    # Database name created on startup

    # Port mapping: host_port:container_port
    # This means localhost:5432 on YOUR machine → port 5432 inside the container
    ports:
      - "5432:5432"

    # Volumes persist data even when the container is stopped/deleted
    # Without this, you'd lose all data every time you restart the container
    volumes:
      - postgres_data:/var/lib/postgresql/data

    # Restart policy — if the container crashes, Docker restarts it
    restart: unless-stopped

# Named volumes — Docker manages the actual storage location
volumes:
  postgres_data:
